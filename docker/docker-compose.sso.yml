# =============================================================================
# IT-Stack: Elasticsearch — Lab 04: SSO Integration
# Module 05 · Phase 4 · Lab 04
# =============================================================================
# Services: Elasticsearch · Kibana · OpenLDAP · Keycloak
# Ports:    Kibana:5630  Keycloak:8504  LDAP:3894
# Credentials:
#   Elastic superuser: elastic / ElasticLab04!
#   Kibana system:     kibana_system / KibanaLab04!
#   Keycloak:          admin / Admin04!
#   LDAP admin:        cn=admin,dc=lab,dc=local / LdapLab04!
# What's new vs Lab 03:
#   + OpenLDAP directory for LDAP user federation
#   + Keycloak 24 dev-mode as OIDC IdP (it-stack realm)
#   + Kibana configured as OIDC relying party (kibana client)
#   + Keycloak OIDC discovery endpoint tested in Lab 04
# =============================================================================

name: it-stack-elasticsearch-lab04

services:

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elastic-s04-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elastic-s04-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.authc.token.enabled: "true"
      ELASTIC_PASSWORD: ElasticLab04!
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elastic-s04-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:ElasticLab04! http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - elastic-s04-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Kibana ───────────────────────────────────────────────────────────────
  elastic-s04-kib:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: elastic-s04-kib
    restart: unless-stopped
    depends_on:
      elastic-s04-es:
        condition: service_healthy
    ports:
      - "5630:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elastic-s04-es:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: KibanaLab04!
      XPACK_SECURITY_ENABLED: "true"
      # Keycloak OIDC IdP reference
      KEYCLOAK_URL: http://elastic-s04-kc:8080
      KEYCLOAK_REALM: it-stack
      KEYCLOAK_CLIENT_ID: kibana
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - elastic-s04-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── OpenLDAP ─────────────────────────────────────────────────────────────
  elastic-s04-ldap:
    image: osixia/openldap:1.5.0
    container_name: elastic-s04-ldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "IT-Stack Lab"
      LDAP_DOMAIN: lab.local
      LDAP_ADMIN_PASSWORD: LdapLab04!
      LDAP_CONFIG_PASSWORD: ConfigLab04!
      LDAP_BASE_DN: dc=lab,dc=local
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ReadOnly04!
    ports:
      - "3894:389"
    volumes:
      - elastic-s04-ldap-data:/var/lib/ldap
      - elastic-s04-ldap-config:/etc/ldap/slapd.d
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost -b dc=lab,dc=local -D cn=admin,dc=lab,dc=local -w LdapLab04! cn=admin > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - elastic-s04-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Keycloak ─────────────────────────────────────────────────────────────
  elastic-s04-kc:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: elastic-s04-kc
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin04!
      KC_HEALTH_ENABLED: "true"
      KC_DB: dev-file
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8504:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - elastic-s04-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  elastic-s04-net:
    name: elastic-s04-net
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  elastic-s04-es-data:
  elastic-s04-ldap-data:
  elastic-s04-ldap-config:
