# Lab 02 — External Dependencies: Elasticsearch + Kibana (external UI client)
# Models the LAN tier: ES on data-net, Kibana bridging data-net → app-net.
# ES API:  http://localhost:9210
# Kibana:  http://localhost:5610
---
name: it-stack-elasticsearch-lab02

services:

  # ── Elasticsearch node (data-net) ─────────────────────────────────────────
  es-l02-node:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: es-l02-node
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=it-stack-lab02
      - node.name=es-l02-node
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9210:9200"
    volumes:
      - es-l02-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 90s
    networks:
      - es-l02-data-net
      - es-l02-app-net

  # ── Kibana (external UI client — bridges data-net and app-net) ────────────
  es-l02-kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: es-l02-kibana
    restart: unless-stopped
    depends_on:
      es-l02-node:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://es-l02-node:9200"
      SERVER_HOST: "0.0.0.0"
      XPACK_SECURITY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
    ports:
      - "5610:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -qE 'available|green|yellow' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - es-l02-data-net
      - es-l02-app-net

networks:
  es-l02-data-net:
    driver: bridge
  es-l02-app-net:
    driver: bridge

volumes:
  es-l02-data:
