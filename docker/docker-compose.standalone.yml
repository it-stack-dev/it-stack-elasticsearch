# Lab 01 — Standalone: Elasticsearch search and analytics engine in isolation
# No external dependencies required — single-node, security disabled for lab use.
---
name: it-stack-elasticsearch-lab01

services:

  es-s01-app:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: es-s01-app
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=it-stack-lab01
      - node.name=es-s01-app
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - es-s01-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?pretty | grep -q 'green\\|yellow' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 90s
    networks:
      - es-s01-net

networks:
  es-s01-net:
    driver: bridge

volumes:
  es-s01-data:
