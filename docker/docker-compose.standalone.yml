# Lab 01 — Standalone: Complete Elasticsearch search and log indexing in isolation
# No external dependencies required.
---
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: it-stack-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:$firstPort"
    environment:
      - IT_STACK_ENV=lab-01-standalone
    volumes:
      - elasticsearch_data:/var/lib/elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - it-stack-net

networks:
  it-stack-net:
    driver: bridge

volumes:
  elasticsearch_data:
