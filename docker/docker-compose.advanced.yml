# Lab 03 — Advanced Features: Elasticsearch + Kibana + Logstash pipeline
# Resource limits on all containers · ILM enabled · Logstash beats/TCP input
# ES API:      http://localhost:9220
# Kibana:      http://localhost:5620
# Logstash:    beats :5044 (internal), TCP syslog :5000 (internal)
---
name: it-stack-elasticsearch-lab03

services:

  # ── Elasticsearch node (resource-limited) ───────────────────────────────
  es-a03-node:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: es-a03-node
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=it-stack-lab03
      - node.name=es-a03-node
      - bootstrap.memory_lock=true
      - indices.lifecycle.poll_interval=10s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9220:9200"
    volumes:
      - es-a03-data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 90s
    networks:
      - es-a03-net

  # ── Kibana (resource-limited) ──────────────────────────────────────────
  es-a03-kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: es-a03-kibana
    restart: unless-stopped
    depends_on:
      es-a03-node:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://es-a03-node:9200"
      SERVER_HOST: "0.0.0.0"
      XPACK_SECURITY_ENABLED: "false"
      TELEMETRY_ENABLED: "false"
      XPACK_REPORTING_ENABLED: "false"
    ports:
      - "5620:5601"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -qE 'available|green|yellow' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - es-a03-net

  # ── Logstash (data pipeline — beats + syslog TCP → ES) ────────────────
  es-a03-logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: es-a03-logstash
    restart: unless-stopped
    depends_on:
      es-a03-node:
        condition: service_healthy
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
      PIPELINE_WORKERS: "1"
      PIPELINE_BATCH_SIZE: "125"
    volumes:
      - es-a03-logstash-pipeline:/usr/share/logstash/pipeline
    command: >
      bash -c '
        mkdir -p /usr/share/logstash/pipeline;
        cat > /usr/share/logstash/pipeline/lab03.conf <<EOF
      input {
        tcp {
          port => 5000
          codec => json_lines
          tags => ["lab03","tcp-input"]
        }
      }
      filter {
        mutate { add_field => { "lab" => "05-03" } }
      }
      output {
        elasticsearch {
          hosts => ["http://es-a03-node:9200"]
          index => "lab03-logs-%{+YYYY.MM.dd}"
        }
      }
      EOF
        /usr/local/bin/docker-entrypoint
      '
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - es-a03-net

networks:
  es-a03-net:
    driver: bridge

volumes:
  es-a03-data:
  es-a03-logstash-pipeline:
